{% extends "base.html" %}
{% block title %}Login - SimutaV2{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="module-card p-4">
            <div class="section-title mb-2">Acceso</div>
            <h1 class="h4 mb-3">Ingresar a SimutaV2</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary w-100" type="submit">Entrar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
