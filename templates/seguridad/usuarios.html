{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h1 class="h3">Usuarios</h1><a class="btn btn-primary" href="{% url 'seguridad:crear_usuario' %}">Nuevo usuario</a></div>
<div class="module-card p-3 table-responsive"><table class="table table-hover"><thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Institucion</th></tr></thead><tbody>{% for perfil in perfiles %}<tr><td>{{ perfil.usuario.username }}</td><td>{{ perfil.usuario.get_full_name }}</td><td>{{ perfil.get_rol_display }}</td><td>{{ perfil.institucion }}</td></tr>{% empty %}<tr><td colspan="4" class="text-muted">No hay perfiles.</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
