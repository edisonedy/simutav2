<form method="post" action="{% url 'pro_simulaciones' %}?action=edit&id={{ simulacion.pk }}" onsubmit="return enviar_formulario(this)">
    {% csrf_token %}
    <div class="modal-header">
        <h5 class="modal-title">Editar simulacion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
        <div class="alert alert-info small">
            <strong>Aqui solo ves lo basico del caso:</strong> materia, modo, titulo, tema, rondas,
            tiempo, rol, contexto, objetivo y situacion inicial.
            Los indicadores, la rubrica y las opciones avanzadas se ajustan desde configuracion.
        </div>
        {{ form.as_p }}
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary">Guardar cambios</button>
    </div>
</form>
