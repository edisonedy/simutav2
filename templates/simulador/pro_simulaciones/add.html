<form method="post" action="{% url 'pro_simulaciones' %}?action=add" onsubmit="return enviar_formulario(this)">
    {% csrf_token %}
    <div class="modal-header">
        <h5 class="modal-title">Nueva simulacion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
        <div class="alert alert-info small">
            <strong>Para empezar:</strong> aqui solo ves lo necesario para crear el caso.
            Despues podras completar indicadores, rubrica, recursos, eventos y opciones avanzadas.
        </div>
        {{ form.as_p }}
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary">Guardar y configurar</button>
    </div>
</form>
